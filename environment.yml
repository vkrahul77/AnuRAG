name: anurag
channels:
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.11
  
  # Core scientific packages
  - numpy>=1.26.0
  - pandas>=1.5.0
  - scipy
  
  # Image processing
  - pillow>=10.0.0
  - opencv
  
  # PDF processing
  - poppler  # Required for pdf2image
  
  # NLP
  - nltk>=3.8.0
  
  # Utilities
  - tqdm>=4.65.0
  - rich>=13.0.0
  
  # Pip packages (not available in conda)
  - pip
  - pip:
    # Google Gemini AI
    - google-generativeai>=0.8.0
    - google-ai-generativelanguage>=0.6.0
    
    # Anthropic Claude (for multi-provider LLM support)
    - anthropic>=0.45.0
    
    # PDF processing
    - pypdf>=3.0.0
    - PyPDF2>=3.0.0
    - PyMuPDF>=1.22.0
    - pdf2image>=1.16.0
    - unstructured>=0.10.0
    
    # Vector stores and embeddings
    - chromadb>=0.4.0
    - faiss-cpu>=1.7.4
    
    # Search and reranking
    - cohere>=5.0.0
    - elasticsearch>=8.0.0
    
    # Environment and config
    - python-dotenv>=0.19.0
    - pydantic>=2.6.1
    
    # Retry logic
    - tenacity>=8.2.0
    
    # Web requests
    - requests>=2.31.0
    - beautifulsoup4>=4.12.0
    - lxml>=4.9.0
    
    # OCR (optional)
    - pytesseract>=0.3.10
    
    # Deep learning (for advanced features)
    - torch>=2.0.0
    - transformers>=4.30.0
